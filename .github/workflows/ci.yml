name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack and activate pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm --version

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - name: Smoke-test extraction (dry-run on fixture)
        run: |
          if [ -d "test/fixtures/textures" ]; then
            pnpm extract:dry --input test/fixtures/textures
          else
            echo "(no fixture textures; skipping smoke-test)"
          fi
