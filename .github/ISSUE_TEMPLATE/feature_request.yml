name: Feature request
description: Suggest an addition or change to the pack
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve
      description: Describe the use case first, then the proposed solution
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed addition or change
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
