name: Bug report
description: Something is broken or doesn't work as documented
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: what-expected
    attributes:
      label: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce — link to a CodeSandbox or repo if helpful
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS / Node version / package version / browser if relevant
    validations:
      required: true
